name: Deploy WesCastleSync to Apps Script
on:
  push:
    paths:
      - 'WesCastleSync.gs'
      - '.github/workflows/deploy-appsscript.yml'
  workflow_dispatch:
concurrency:
  group: clasp-deploy
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2
      - name: Write clasp credentials (from base64 secret)
        env:
          CLASPRC_B64: ${{ secrets.CLASPRC_B64 }}
        run: |
          if [ -z "$CLASPRC_B64" ]; then echo "CLASPRC_B64 secret is empty"; exit 1; fi
          printf '%s' "$CLASPRC_B64" | base64 -d > "$HOME/.clasprc.json"
          node -e '
            const c = require(process.env.HOME + "/.clasprc.json");
            // clasp 2.x reads the token at c.token.access_token.
            // clasp 3.x saves creds under c.tokens.default (no top-level token) -> version mismatch.
            if (c.tokens && c.tokens.default && !(c.token && c.token.access_token)) {
              throw new Error("CLASPRC_B64 is in clasp 3.x format (tokens.default) but this workflow uses clasp 2.4.2, which needs token.access_token. Regenerate the secret with: npm i -g @google/clasp@2.4.2 && clasp login, then base64 ~/.clasprc.json into CLASPRC_B64.");
            }
            if (!(c.token && c.token.access_token && c.token.refresh_token)) {
              throw new Error("CLASPRC_B64 missing token.access_token / token.refresh_token expected by clasp 2.4.2. Regenerate with clasp 2.4.2 clasp login.");
            }
            console.log("credential OK (clasp 2.x format)");
          '

      - name: Deploy WesCastleSync.gs
        env:
          SCRIPT_ID: '1PNeHFffcPYmkH0KcE0fKanVvWattES3PKM3CfaVJUEjXPzonMyFe20Zl'
          DEPLOY_ID: 'AKfycby7Gvo_PgBXwp6bbJ272HrHN26RU645psSH5eNSYndw1hut6wwWdyuQrudsqSQjna3-'
        run: |
          set -e
          mkdir -p appsscript
          printf '{"scriptId":"%s","rootDir":"./appsscript"}\n' "$SCRIPT_ID" > .clasp.json
          clasp pull
          echo "--- pulled files ---"; ls -la appsscript
          CODE_FILE=$(find appsscript -maxdepth 1 -type f \( -name '*.js' -o -name '*.gs' \) ! -name 'appsscript.json' | head -1)
          if [ -z "$CODE_FILE" ]; then CODE_FILE="appsscript/Code.js"; fi
          echo "Writing source into: $CODE_FILE"
          cp WesCastleSync.gs "$CODE_FILE"
          clasp push -f
          echo "PUSH_DONE"
          clasp deploy -i "$DEPLOY_ID" -d "Auto-deploy $(date -u +%FT%TZ)"
          echo "DEPLOY_DONE"

# trigger: redeploy after CLASPRC_B64 refresh 2026-07-22T22:04:38Z
